                { need: 8, have: 5, unit: '🪵', unitName: '木材', each: 1, eachName: '每座桥', question: '需要8根🪵，已经有5根，还差几根？', answer: 3 },
                { need: 10, have: 4, unit: '📦', unitName: '补给', each: 2, eachName: '每村', question: '需要10箱📦，已有4箱，每个村子给2箱，去几个村子够？', answer: 3 },
                { need: 6, have: 2, unit: '🔧', unitName: '工具', each: 2, eachName: '每个', question: '需要6个🔧，已有2个，每堆有2个，还要几堆？', answer: 2 },
                { need: 5, have: 0, unit: '🔑', unitName: '钥匙', each: 1, eachName: '每座桥', question: '要过5座桥🌉，每座桥要1把🔑，共需几把？', answer: 5 },
                { need: 12, have: 8, unit: '🍎', unitName: '苹果', each: 2, eachName: '每袋', question: '需要12个🍎，已有8个，每袋装2个，还需几袋？', answer: 2 }
            ];
            
            const puzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
            const remaining = puzzle.need - puzzle.have;
            const options = generateOptions(puzzle.answer, 4, puzzle.answer + 4);
            
            currentGameData = {
                type: 'chain',
                answer: puzzle.answer
            };
            
            updateHint('🚛 帮车队算算需要多少~');
            
            container.innerHTML = `
                <div style="position:absolute;width:100%;height:100%;background:linear-gradient(180deg,#E17055 0%,#FDCB6E 50%,#00B894 100%);z-index:0;"></div>
                <div class="task-box" style="z-index:20;position:relative;">
                    <p class="task-text">🚛 补给车队：算算要准备多少！</p>
                </div>
                <div style="z-index:10;position:relative;text-align:center;padding:20px;">
                    <div style="background:rgba(255,255,255,0.95);border-radius:15px;padding:15px;margin:15px auto;max-width:340px;">
                        <p style="font-size:16px;color:#333;margin-bottom:10px;">📋 任务清单：</p>
                        <p style="font-size:15px;color:#666;">需要：<span style="font-weight:bold;color:#E17055;">${puzzle.need}</span> ${puzzle.unitName}</p>
                        <p style="font-size:15px;color:#666;">已有：<span style="font-weight:bold;color:#00B894;">${puzzle.have}</span> ${puzzle.unitName}</p>
                    </div>
                    <div style="background:linear-gradient(135deg,rgba(253,203,110,0.4) 0%,rgba(230,126,34,0.4) 100%);border-radius:15px;padding:15px;margin:15px auto;max-width:340px;">
                        <p style="font-size:18px;color:white;">${puzzle.question}</p>
                    </div>
                    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;">
                        ${shuffleArray(options).map(opt => `
                            <button class="battle-option" onclick="checkChainAnswer(${opt}, ${puzzle.answer})" style="padding:15px 25px;font-size:22px;min-width:60px;">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkChainAnswer(selected, correct) {
            const buttons = document.querySelectorAll('.battle-option');
            buttons.forEach(btn => btn.disabled = true);
            
            if (selected === correct) {
                playSound('victory');
                buttons.forEach(btn => {
                    if (parseInt(btn.textContent) === correct) btn.classList.add('correct');
                });
                
                const stars = calculateStars();
                const sceneId = gameState.currentScene.id;
                
                if (!gameState.completedScenes.includes(sceneId)) {
                    gameState.completedScenes.push(sceneId);
                    gameState.totalStars += stars;
                    gameState.regionStars[gameState.currentRegion.id] = 
                        (gameState.regionStars[gameState.currentRegion.id] || 0) + stars;
                }
                
                gameState.sceneAttempts[sceneId]++;
                adjustDifficulty(true);
                saveGame();
                
                setTimeout(() => showReward(stars), 500);
            } else {
                playSound('wrong');
                buttons.forEach(btn => {
                    if (parseInt(btn.textContent) === selected) btn.classList.add('wrong');
                    if (parseInt(btn.textContent) === correct) btn.classList.add('correct');
                });
                adjustDifficulty(false);
                updateHint('需要减去已有的，再算算~');
                
                setTimeout(() => {
                    buttons.forEach(btn => {
                        btn.classList.remove('wrong', 'correct');
                        btn.disabled = false;
                    });
                }, 1500);
            }
        }

        // ========== 影子之谜场景 - 投影识别 ==========
        function renderShadowScene(container, scene) {
            // 核心思维：从轮廓反推原物
            const puzzles = [
                { shadow: '🔲', options: ['🟥','🟦','🟧','🟩'], answer: 1, hint: '正方形影子对应正方形~' },
                { shadow: '🔵', options: ['🟥','🔺','⭕','🟦'], answer: 2, hint: '圆形影子对应圆形~' },
                { shadow: '▲', options: ['🔵','🟥','🔺','🟦'], answer: 2, hint: '三角形影子对应三角形~' },
                { shadow: '⬜', options: ['🔵','🔺','🟦','🔲'], answer: 3, hint: '大正方形影子~' },
                { shadow: '♦️', options: ['🔺','🟥','🔷','⭕'], answer: 2, hint: '菱形影子对应菱形~' }
            ];
            
            const puzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
            const shuffledOptions = shuffleArray([...puzzle.options]);
            const answerIndex = shuffledOptions.indexOf(puzzle.options[puzzle.answer]);
            
            currentGameData = {
                type: 'shadow',
                answer: answerIndex
            };
            
            updateHint('🌘 影子看不清，是谁的影子呢？');
            
            container.innerHTML = `
                <div style="position:absolute;width:100%;height:100%;background:linear-gradient(180deg,#A29BFE 0%,#6C5CE7 50%,#2D3436 100%);z-index:0;"></div>
                <div class="task-box" style="z-index:20;position:relative;">
                    <p class="task-text">🌘 影子之谜：这是谁的影子？</p>
                </div>
                <div style="z-index:10;position:relative;text-align:center;padding:20px;">
                    <div style="background:rgba(0,0,0,0.3);border-radius:20px;padding:30px;margin:20px auto;display:inline-block;min-width:150px;min-height:150px;">
                        <div style="font-size:100px;filter:brightness(0);opacity:0.6;">${puzzle.shadow}</div>
                    </div>
                    <p style="color:rgba(255,255,255,0.7);font-size:14px;margin:10px 0;">↓ 选出正确的物品 ↓</p>
                    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:15px;">
                        ${shuffledOptions.map((opt, i) => `
                            <button class="battle-option" onclick="checkShadowAnswer(${i}, ${answerIndex})" style="padding:15px 25px;font-size:35px;min-width:70px;" id="shadow-opt-${i}">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkShadowAnswer(selected, correct) {
            const buttons = document.querySelectorAll('.battle-option');
            buttons.forEach(btn => btn.disabled = true);
            
            if (selected === correct) {
                playSound('victory');
                buttons[correct].classList.add('correct');
                
                const stars = calculateStars();
                const sceneId = gameState.currentScene.id;
                
                if (!gameState.completedScenes.includes(sceneId)) {
                    gameState.completedScenes.push(sceneId);
                    gameState.totalStars += stars;
                    gameState.regionStars[gameState.currentRegion.id] = 
                        (gameState.regionStars[gameState.currentRegion.id] || 0) + stars;
                }
                
                gameState.sceneAttempts[sceneId]++;
                adjustDifficulty(true);
                saveGame();
                
                setTimeout(() => showReward(stars), 500);
            } else {
                playSound('wrong');
                buttons[selected].classList.add('wrong');
                buttons[correct].classList.add('correct');
                adjustDifficulty(false);
                updateHint('想想这个形状是什么样的~');
                
                setTimeout(() => {
                    buttons.forEach(btn => {
                        btn.classList.remove('wrong', 'correct');
                        btn.disabled = false;
                    });
                }, 1500);
            }
        }

        // ========== 折纸工坊场景 - 空间想象 ==========
        function renderFoldScene(container, scene) {
            // 核心思维：纸折叠/展开后的样子
            const puzzles = [
                { question: '一张纸对折1次，变成了几层？', options: [1, 2, 3, 4], answer: 1, hint: '对折就是叠起来，变成2层~' },
                { question: '一张纸对折2次，变成了几层？', options: [2, 3, 4, 6], answer: 2, hint: '第1次折变2层，第2次折每层又变2层...' },
                { question: '一张纸对折3次，变成了几层？', options: [4, 6, 8, 10], answer: 2, hint: '每次折，层数翻倍：2→4→8~' },
                { question: '一张纸对折1次后在中间打1个洞，展开后有2个洞。对折2次后在中间打1个洞，展开后有几个洞？', options: [2, 3, 4, 6], answer: 2, hint: '对折1次=2层=2个洞，对折2次=4层=4个洞' }
            ];
            
            const puzzle = puzzles[Math.floor(Math.random() * puzzles.length)];
            
            currentGameData = {
                type: 'fold',
                answer: puzzle.answer
            };
            
            updateHint('📄 折纸展开后变成什么样？');
            
            container.innerHTML = `
                <div style="position:absolute;width:100%;height:100%;background:linear-gradient(180deg,#A29BFE 0%,#6C5CE7 50%,#2D3436 100%);z-index:0;"></div>
                <div style="position:absolute;width:100%;height:100%;z-index:1;pointer-events:none;">
                    <div style="position:absolute;top:10%;right:10%;font-size:100px;opacity:0.1;">📄</div>
                </div>
                <div class="task-box" style="z-index:20;position:relative;">
                    <p class="task-text">📄 折纸工坊：想想展开后的样子！</p>
                </div>
                <div style="z-index:10;position:relative;text-align:center;padding:20px;">
                    <div style="display:flex;justify-content:center;align-items:center;gap:30px;margin:20px 0;">
                        <div style="text-align:center;">
                            <div style="width:80px;height:80px;background:white;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:40px;">📄</div>
                            <p style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:5px;">折纸</p>
                        </div>
                        <div style="font-size:30px;color:white;">→</div>
                        <div style="text-align:center;">
                            <div style="font-size:50px;animation:pulse 1s infinite;">✂️</div>
                            <p style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:5px;">剪一下</p>
                        </div>
                        <div style="font-size:30px;color:white;">→</div>
                        <div style="text-align:center;">
                            <div style="font-size:50px;animation:pulse 1s infinite;">✨</div>
                            <p style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:5px;">展开</p>
                        </div>
                    </div>
                    <div style="background:linear-gradient(135deg,rgba(253,203,110,0.3) 0%,rgba(230,126,34,0.3) 100%);border-radius:15px;padding:15px;margin:15px auto;max-width:350px;">
                        <p style="font-size:17px;color:white;">${puzzle.question}</p>
                    </div>
                    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;">
                        ${puzzle.options.map(opt => `
                            <button class="battle-option" onclick="checkFoldAnswer(${opt}, ${puzzle.answer})" style="padding:15px 25px;font-size:22px;min-width:60px;">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkFoldAnswer(selected, correct) {
            const buttons = document.querySelectorAll('.battle-option');
            buttons.forEach(btn => btn.disabled = true);
            
            if (selected === correct) {
                playSound('victory');
                buttons.forEach(btn => {
                    if (parseInt(btn.textContent) === correct) btn.classList.add('correct');
                });
                
                const stars = calculateStars();
                const sceneId = gameState.currentScene.id;
                
                if (!gameState.completedScenes.includes(sceneId)) {
                    gameState.completedScenes.push(sceneId);
                    gameState.totalStars += stars;
                    gameState.regionStars[gameState.currentRegion.id] = 
                        (gameState.regionStars[gameState.currentRegion.id] || 0) + stars;
                }
                
                gameState.sceneAttempts[sceneId]++;
                adjustDifficulty(true);
                saveGame();
                
                setTimeout(() => showReward(stars), 500);
            } else {
                playSound('wrong');
                buttons.forEach(btn => {
                    if (parseInt(btn.textContent) === selected) btn.classList.add('wrong');
                    if (parseInt(btn.textContent) === correct) btn.classList.add('correct');
                });
                adjustDifficulty(false);
                updateHint('折纸游戏要多动手试试哦~');
                
                setTimeout(() => {
                    buttons.forEach(btn => {
                        btn.classList.remove('wrong', 'correct');
                        btn.disabled = false;
                    });
                }, 1500);
            }
        }

        // ========== 辅助函数 ==========
        function updateHint(text) {
            document.getElementById('hintArea').innerHTML = `
                <p class="hint-text">${text}</p>
            `;
        }

        function resetGameStars() {
            const starsEl = document.getElementById('gameStars');
            starsEl.innerHTML = '<span class="game-star">☆</span><span class="game-star">☆</span><span class="game-star">☆</span>';
        }

        function calculateStars() {
            const attempts = gameState.sceneAttempts[gameState.currentScene.id] || 1;
            if (attempts === 1) return 3;
            if (attempts <= 3) return 2;
            return 1;
        }

        function createFloatingStar() {
            const star = document.createElement('div');
            star.className = 'floating-star';
            star.textContent = '⭐';
            star.style.left = '50%';
            star.style.top = '50%';
            document.body.appendChild(star);
            
            setTimeout(() => star.remove(), 1000);
        }

        // ========== 奖励页 ==========
        function showReward(stars) {
            playSound('victory');
            createConfetti();
            
            const rewardStars = document.getElementById('rewardStars');
            const messages = [
                '继续加油！',
                '太棒了！',
                '完美通关！'
            ];
            
            document.getElementById('rewardMessage').textContent = messages[stars - 1];
            
            rewardStars.querySelectorAll('.reward-star').forEach((star, i) => {
                star.classList.remove('show');
                if (i < stars) {
                    setTimeout(() => star.classList.add('show'), 200 + i * 300);
                }
            });
            
            showScreen('reward');
        }

        function createConfetti() {
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = (Math.random() * 10 + 5) + 'px';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        // ========== 成长页 ==========
        function renderProfile() {
            const content = document.getElementById('profileContent');
            
            // 计算解锁的技能
            const unlockedSkills = new Set(['calc', 'data']); // 默认解锁
            if (gameState.completedScenes.some(s => s.startsWith('mountain'))) {
                unlockedSkills.add('calc');
            }
            if (gameState.completedScenes.some(s => s.startsWith('castle'))) {
                unlockedSkills.add('shape');
            }
            if (gameState.completedScenes.some(s => s.startsWith('maze'))) {
                unlockedSkills.add('logic');
            }
            
            // 计算徽章
            const badges = [
                { ...GAME_DATA.badges[0], unlocked: gameState.completedScenes.length > 0 },
                { ...GAME_DATA.badges[1], unlocked: gameState.regionStars['forest'] >= 8 },
                { ...GAME_DATA.badges[2], unlocked: gameState.regionStars['mountain'] >= 8 },
                { ...GAME_DATA.badges[3], unlocked: gameState.regionStars['castle'] >= 8 },
                { ...GAME_DATA.badges[4], unlocked: gameState.regionStars['maze'] >= 8 },
                { ...GAME_DATA.badges[5], unlocked: gameState.totalStars >= 30 }
            ];
            
            content.innerHTML = `
                <div class="profile-card">
                    <div class="card-title">
                        <span style="font-size: 40px;">🦊</span>
                        <div>
                            <div style="font-size: 20px;">${gameState.playerName}</div>
                            <div style="font-size: 14px; opacity: 0.7;">总共获得 ${gameState.totalStars} 颗星星</div>
                        </div>
                    </div>
                </div>
                
                <div class="profile-card">
                    <div class="card-title">🌟 技能树</div>
                    <div class="skills-grid">
                        ${GAME_DATA.skills.map(skill => `
                            <div class="skill-item ${unlockedSkills.has(skill.id) ? 'unlocked' : 'locked'}">
                                <span class="skill-icon">${skill.icon}</span>
                                <span class="skill-name">${skill.name}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="profile-card">
                    <div class="card-title">🐾 我的伙伴</div>
                    <div class="pet-collection">
                        <div class="pet-slot unlocked">🦊</div>
                        ${gameState.totalStars >= 10 ? '<div class="pet-slot unlocked">🐰</div>' : '<div class="pet-slot">🔒</div>'}
                        ${gameState.totalStars >= 20 ? '<div class="pet-slot unlocked">🐼</div>' : '<div class="pet-slot">🔒</div>'}
                    </div>
                </div>
                
                <div class="profile-card">
                    <div class="card-title">🏆 徽章收集</div>
                    <div class="badges-grid">
                        ${badges.map(badge => `
                            <div class="badge-item ${badge.unlocked ? 'unlocked' : ''}" title="${badge.name}">
                                ${badge.unlocked ? badge.icon : '❓'}
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="profile-card">
                    <div class="card-title">📊 学习报告</div>
                    <div style="font-size: 14px; color: #666;">
                        <p>已完成场景：${gameState.completedScenes.length} / 16</p>
                        <p>当前难度等级：${gameState.adaptive.level}</p>
                        <p>正确率：${gameState.adaptive.totalAttempt > 0 ? Math.round(gameState.adaptive.totalCorrect / gameState.adaptive.totalAttempt * 100) : 0}%</p>
                    </div>
                </div>
            `;
            
            showScreen('profile');
        }

        // ========== 事件绑定 ==========
        function initEventListeners() {
            // 欢迎页
            document.getElementById('startBtn').addEventListener('click', () => {
                initAudio();
                const name = document.getElementById('playerName').value.trim();
                if (name) gameState.playerName = name;
                saveGame();
                renderWorldMap();
                showScreen('worldmap');
                playSound('click');
            });
            
            // 返回按钮
            document.getElementById('backToMap').addEventListener('click', () => {
                renderWorldMap();
                showScreen('worldmap');
                playSound('click');
            });
            
            document.getElementById('backToRegion').addEventListener('click', () => {
                renderRegion();
                showScreen('region');
                playSound('click');
            });
            
            document.getElementById('backToRegionBtn').addEventListener('click', () => {
                renderRegion();
                showScreen('region');
                playSound('click');
            });
            
            document.getElementById('backToMapBtn').addEventListener('click', () => {
                renderWorldMap();
                showScreen('worldmap');
                playSound('click');
            });
            
            document.getElementById('backFromProfile').addEventListener('click', () => {
                renderWorldMap();
                showScreen('worldmap');
                playSound('click');
            });
            
            // 成长页
            document.getElementById('profileBtn').addEventListener('click', () => {
                renderProfile();
                playSound('click');
            });
        }

        // ========== 初始化 ==========
        function init() {
            createStars();
            loadGame();
            initEventListeners();
            
            // 显示欢迎页
            document.getElementById('playerName').value = gameState.playerName;
        }

        // 启动游戏
        init();
    </script>
</body>
